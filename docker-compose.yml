version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_fastapi:/var/lib/postgresql/data

  web:
    build: .
    container_name: fastapi_app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  
  producer:
    build: ./producer
    container_name: producer
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: ["python", "producer.py"]
    
  redis:
    image: redis:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
  
  adminer:
    image: adminer
    restart: on-failure:5
    ports:
      - 8084:8080


volumes:
  postgres_data_fastapi:
